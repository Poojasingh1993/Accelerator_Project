# This is a Databricks asset bundle definition for accelerator.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: accelerator
  uuid: 84a0bcf0-52ba-40c6-9a27-ae99e7d4285f

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-72b813f1-258b.cloud.databricks.com
    variables:
      catalog: accelerator_dev
      schema: rnd
  prod:
    mode: production
    workspace:
      host: https://dbc-72b813f1-258b.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/poojaswait25@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/poojaswait25@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: accelerator_dev
      schema: rnd
    permissions:
      - user_name: poojaswait25@gmail.com
        level: CAN_MANAGE
